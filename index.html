<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nebraska AQI Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 16px; }
    h1 { font-size: 22px; font-weight: 700; color: #f8fafc; }
    .subtitle { font-size: 13px; color: #94a3b8; margin: 4px 0 20px; }
    .banner { border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .banner-label { font-weight: 700; font-size: 18px; }
    .banner-rec { font-size: 13px; margin-top: 2px; }
    .banner-aqi { font-size: 28px; font-weight: 800; text-align: right; }
    .banner-aqi-label { font-size: 11px; }
    .thresholds { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .threshold-tag { background: #1e293b; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 600; }
    .alert-bar { background: #7f1d1d; border: 1px solid #ef4444; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .card { background: #1e293b; border-radius: 10px; padding: 14px; border-left: 4px solid #334155; }
    .card-city { font-weight: 700; font-size: 15px; color: #f1f5f9; }
    .card-area { font-size: 11px; color: #64748b; margin-bottom: 8px; }
    .card-aqi { font-size: 32px; font-weight: 800; }
    .card-label { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .card-detail { font-size: 11px; color: #94a3b8; }
    .card-detail span { color: #e2e8f0; }
    .card-nodata { font-size: 13px; color: #475569; margin-top: 8px; }
    .scale { margin-top: 20px; background: #1e293b; border-radius: 10px; padding: 14px; }
    .scale-title { font-size: 12px; color: #64748b; margin-bottom: 8px; font-weight: 600; }
    .scale-bands { display: flex; gap: 4px; flex-wrap: wrap; }
    .scale-band { border-radius: 4px; padding: 3px 8px; font-size: 11px; font-weight: 600; }
    .footer { margin-top: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .footer-text { font-size: 11px; color: #475569; }
    .refresh-btn { background: #334155; color: #e2e8f0; border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .refresh-btn:hover { background: #475569; }
    .loading { text-align: center; padding: 40px; color: #64748b; font-size: 15px; }
    .error { background: #7f1d1d; border-radius: 8px; padding: 16px; color: #fca5a5; }
  </style>
</head>
<body>

<h1>🌾 Nebraska AQI Tracker</h1>
<p class="subtitle">Flint Hills Burn Season Monitor · EPA AirNow</p>

<div id="banner"></div>
<div class="thresholds">
  <div class="threshold-tag" style="border: 2px solid #ff7e00; color: #ff7e00;">⚑ Watch threshold: AQI 100</div>
  <div class="threshold-tag" style="border: 2px solid #ff0000; color: #ff0000;">⚑ Act threshold: AQI 150</div>
  <div class="threshold-tag" style="color: #94a3b8;">🔥 PM2.5 = burn smoke indicator</div>
</div>
<div id="alert-bar"></div>
<div id="grid" class="grid"><div class="loading">⏳ Fetching live AQI data for Nebraska stations...</div></div>

<div class="scale">
  <div class="scale-title">AQI SCALE</div>
  <div class="scale-bands" id="scale-bands"></div>
</div>

<div class="footer">
  <div class="footer-text" id="updated"></div>
  <button class="refresh-btn" onclick="fetchAll()">↻ Refresh</button>
</div>

<script>
const API_KEY = "D316D2CC-0F0E-4033-AB76-4D40CB871E35";

const BANDS = [
  { max: 50,  label: "Good",               color: "#00e400", text: "#000", rec: "All clear — outdoor activity fine." },
  { max: 100, label: "Moderate",           color: "#ffff00", text: "#000", rec: "Sensitive groups should limit prolonged outdoor exertion." },
  { max: 150, label: "Unhealthy for Some", color: "#ff7e00", text: "#000", rec: "⚠️ Consider moving runs/cycling indoors." },
  { max: 200, label: "Unhealthy",          color: "#ff0000", text: "#fff", rec: "🚫 Move all outdoor exercise indoors." },
  { max: 300, label: "Very Unhealthy",     color: "#8f3f97", text: "#fff", rec: "🚫 Avoid all outdoor activity." },
  { max: 500, label: "Hazardous",          color: "#7e0023", text: "#fff", rec: "🚫 Stay indoors. Health emergency." },
];

const STATIONS = [
  { zip: "68502", city: "Lincoln" },
  { zip: "68102", city: "Omaha" },
  { zip: "68901", city: "Hastings" },
  { zip: "68847", city: "Kearney" },
  { zip: "69101", city: "North Platte" },
  { zip: "68701", city: "Norfolk" },
  { zip: "68776", city: "South Sioux City" },
  { zip: "68301", city: "Beatrice" },
  { zip: "68410", city: "Nebraska City" },
  { zip: "69361", city: "Scottsbluff" },
];

function getBand(aqi) {
  return BANDS.find(b => aqi <= b.max) || BANDS[BANDS.length - 1];
}

// Render AQI scale
document.getElementById("scale-bands").innerHTML = BANDS.map(b =>
  `<div class="scale-band" style="background:${b.color};color:${b.text}">${b.label}</div>`
).join("");

async function fetchStation({ zip, city }) {
  const url = `https://www.airnowapi.org/aq/observation/zipCode/current/?format=application/json&zipCode=${zip}&distance=25&API_KEY=${API_KEY}`;
  const res = await fetch(url);
  const json = await res.json();
  const pm25 = json.find(o => o.ParameterName === "PM2.5");
  const ozone = json.find(o => o.ParameterName === "O3" || o.ParameterName === "Ozone");
  const primary = pm25 || [...json].sort((a, b) => b.AQI - a.AQI)[0];
  return {
    city, zip,
    aqi: primary?.AQI ?? null,
    pollutant: primary?.ParameterName ?? "—",
    pm25aqi: pm25?.AQI ?? null,
    o3aqi: ozone?.AQI ?? null,
    reportingArea: primary?.ReportingArea ?? city,
  };
}

async function fetchAll() {
  document.getElementById("grid").innerHTML = '<div class="loading">⏳ Fetching live AQI data for Nebraska stations...</div>';
  document.getElementById("banner").innerHTML = "";
  document.getElementById("alert-bar").innerHTML = "";

  try {
    const results = await Promise.all(STATIONS.map(fetchStation));
    const valid = results.filter(d => d.aqi !== null);
    const maxAQI = valid.length ? Math.max(...valid.map(d => d.aqi)) : null;
    const band = maxAQI !== null ? getBand(maxAQI) : null;
    const alerts = valid.filter(d => d.aqi > 100);

    // Banner
    if (band) {
      document.getElementById("banner").innerHTML = `
        <div class="banner" style="background:${band.color};color:${band.text}">
          <div>
            <div class="banner-label">Statewide: ${band.label}</div>
            <div class="banner-rec">${band.rec}</div>
          </div>
          <div>
            <div class="banner-aqi">${maxAQI}</div>
            <div class="banner-aqi-label">Highest AQI in NE</div>
          </div>
        </div>`;
    }

    // Alert bar
    if (alerts.length > 0) {
      document.getElementById("alert-bar").innerHTML = `
        <div class="alert-bar">⚠️ <strong>Elevated AQI detected</strong> at: ${alerts.map(s => s.city).join(", ")}</div>`;
    }

    // Cards
    document.getElementById("grid").innerHTML = results.map(({ city, aqi, pollutant, pm25aqi, o3aqi, reportingArea }) => {
      const b = aqi !== null ? getBand(aqi) : null;
      return `
        <div class="card" style="border-left-color:${b?.color ?? "#334155"}">
          <div class="card-city">${city}</div>
          <div class="card-area">${reportingArea}</div>
          ${aqi !== null ? `
            <div class="card-aqi" style="color:${b.color}">${aqi}</div>
            <div class="card-label" style="color:${b.color}">${b.label}</div>
            <div class="card-detail">
              ${pm25aqi !== null ? `<div>PM2.5: <span>${pm25aqi}</span></div>` : ""}
              ${o3aqi !== null ? `<div>Ozone: <span>${o3aqi}</span></div>` : ""}
              <div>Primary: <span>${pollutant}</span></div>
            </div>` : `<div class="card-nodata">No data available</div>`}
        </div>`;
    }).join("");

    document.getElementById("updated").textContent = `Data: EPA AirNow · Updated ${new Date().toLocaleTimeString()}`;

  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="error">Failed to fetch data. Check API key or network connection.</div>`;
  }
}

fetchAll();
</script>
</body>
</html>
